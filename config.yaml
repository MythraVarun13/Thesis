# ============================================================
# ZORO Energy — EnFa EDA Project Configuration
# Committed to git — no machine-specific paths here.
#
# Machine-specific overrides go in config_local.yaml
# (copy config_local.yaml.example and fill it in).
# ============================================================

project:
  name: "EnFa EDA — ZORO Energy"
  version: "1.0.0"

paths:
  # project_root is intentionally NOT set here — it is machine-specific.
  # Set it in config_local.yaml, or leave it out to use auto-detection.
  # Scripts find the project root from their own file location automatically.

  # Raw data directory — relative to project_root, READ ONLY
  raw_data: "data"

  # Output directories — relative to project_root
  reports:      "reports"
  plots:        "reports/plots"
  samples:      "reports/sample_rows"
  context:      "context"
  notebooks:    "notebooks"
  scripts:      "scripts"
  processed:    "data/processed"
  data_samples: "data/samples"

sampling:
  head_rows:     30      # rows to read from file head for interval detection
  head_bytes:    6144    # bytes to read for schema detection (6 KB)
  tail_bytes:    4096    # bytes to read from file end for last timestamp (4 KB)
  sample_rows:   20      # rows saved per signal in sample_rows/
  plot_max_rows: 5000    # max rows loaded per signal for plotting

data:
  delimiter:       ";"
  encoding:        "utf-8"
  timestamp_col:   "_time"
  value_col:       "_value"
  field_col:       "_field"
  measurement_col: "_measurement"
  timestamp_tz:    "UTC"            # all timestamps use UTC (Z suffix)
  local_tz:        "Europe/Berlin"  # convert to this for scheduling analysis

pipeline:
  required_fields:    ["timestamp", "device_id", "metric", "value", "unit"]
  building_id_prefix: "de-enfa-main-01"  # confirm from thesis

exclude_signals:
  # Confirmed commissioning test artifacts - exclude from all analysis
  - "A"
  - "_value"
  - "pilot"
  - "val1006"
  - "val1007"
  - "val1008"
  - "val1009"
